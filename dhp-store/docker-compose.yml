
services:
  # 1. Frontend React App
  frontend:
    build: 
      context: ./client
      args:
        - VITE_STRIPE_PUBLIC_KEY=${VITE_STRIPE_PUBLIC_KEY}
        - VITE_BACKEND_URL=${BACKEND_URL}
    ports:
      - "5173:80" 
    depends_on:
      - backend

  # 2. Node.js Backend
  backend:
    build: ./server
    ports:
      - "5001:5001"
    depends_on:
      - redis
      - ai-service
    volumes:
      - ./server/src/uploads:/app/src/uploads 
    env_file:
      - .env
    environment:
      # Internal Docker network routing
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:10000

  # 3. Python AI Service
  ai-service:
    build: ./ai-service
    ports:
      - "10000:10000"
    env_file:
      - .env 

  # 4. Redis Cache
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: